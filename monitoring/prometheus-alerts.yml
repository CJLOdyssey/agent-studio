# Virtual Team — Prometheus Alerting Rules
# Deploy to your Prometheus server's rules directory.
# Example: /etc/prometheus/rules/agent-studio.yml

groups:
  - name: agent-studio
    interval: 30s
    rules:

      # ── Availability ────────────────────────────────────────────────────

      - alert: BackendDown
        expr: up{job="agent-studio-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Virtual Team backend is unreachable"
          description: |
            Backend instance {{ $labels.instance }} has been down for over 1 minute.
            Action: SSH into the server and check `docker compose ps` and `docker compose logs backend`.

      - alert: HighErrorRate
        expr: |
          rate(http_errors_total[5m]) /
          rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "HTTP 5xx error rate exceeds 5%"
          description: |
            Error rate: {{ $value | humanizePercentage }} over the last 5 minutes.
            Action: Check `docker compose logs backend` and `/api/debug/errors`.

      # ── Performance ─────────────────────────────────────────────────────

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le)
          ) > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "95th percentile latency exceeds 5s"
          description: |
            p95 latency: {{ $value | humanizeDuration }} over the last 5 minutes.
            Action: Check for slow LLM responses, DB query bottlenecks, or resource contention.

      - alert: LatencySpike
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[1m])) by (le)
          ) > 30
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "99th percentile latency exceeds 30s"
          description: |
            p99 latency: {{ $value | humanizeDuration }} over the last 1 minute.
            Action: Likely an LLM timeout or deadlock. Check logs immediately.

      # ── Resource Exhaustion ──────────────────────────────────────────────

      # Note: These require node_exporter or cAdvisor metrics.
      # Uncomment if you have those exporters configured.

