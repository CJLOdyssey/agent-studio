services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: virtual-team-db
    restart: always
    environment:
      POSTGRES_DB: virtual_team
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: virtual-team-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com/${ACR_NAMESPACE:-virtual-team}/virtual-team:${IMAGE_TAG:-latest}
    container_name: virtual-team-api
    restart: always
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-v4-flash}
      - MAX_ROUNDS=${MAX_ROUNDS:-5}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - TIMEOUT=${TIMEOUT:-120}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/virtual_team
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - KEY_VAULT_SECRET=${KEY_VAULT_SECRET:-}
      - SECRETS_DIR=/secrets
    volumes:
      - secrets:/secrets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - 1panel.enable=true
      - 1panel.app=virtual-team
      - 1panel.description=虚拟软件外包团队 API

  celery_worker:
    image: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com/${ACR_NAMESPACE:-virtual-team}/virtual-team:${IMAGE_TAG:-latest}
    container_name: virtual-team-worker
    restart: always
    command: celery -A virtual_team.broker.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A virtual_team.broker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-deepseek-v4-flash}
      - MAX_ROUNDS=${MAX_ROUNDS:-5}
      - TEMPERATURE=${TEMPERATURE:-0.7}
      - TIMEOUT=${TIMEOUT:-120}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/virtual_team
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - KEY_VAULT_SECRET=${KEY_VAULT_SECRET:-}
      - SECRETS_DIR=/secrets
    volumes:
      - secrets:/secrets
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    container_name: virtual-team-frontend
    restart: always
    volumes:
      - ../../frontend/dist:/usr/share/nginx/html:ro
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - 1panel.enable=true
      - 1panel.app=virtual-team
      - 1panel.description=虚拟软件外包团队 - 前端

volumes:
  pgdata:
  secrets:

networks:
  default:
    name: virtual-team-network
