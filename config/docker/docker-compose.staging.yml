# ── Staging compose override ─────────────────────────────────────────────
# Overrides base docker-compose.yml for staging deployment on the same host.
# All ports are offset to avoid conflicts with production services.
# ────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    ports:
      - "5433:5432"
    volumes:
      - pgdata_staging:/var/lib/postgresql/data

  redis:
    ports:
      - "6380:6379"

  api:
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/virtual_team

  celery_worker:
    profiles:
      - dont-start-automatically

  nginx:
    profiles:
      - dont-start-automatically

volumes:
  pgdata_staging:
