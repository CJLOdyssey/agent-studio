[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"virtual_team/routers/*.py" = ["B008"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.11"
warn_unused_ignores = true
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = "virtual_team.agent_graph"
ignore_errors = true

