[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
"backend/routers/*.py" = ["B008"]
"backend/auth/auth_rbac.py" = ["F401"]
"tests/*.py" = ["E501", "SIM117", "N806"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.11"
warn_unused_ignores = true
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
# addopts intentionally left empty — CI controls pytest flags directly
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "env: marks tests that need specific environment variables",
    "integration: marks tests that require a running backend + Docker stack (deselect with '-m \"not integration\"')",
    "requirement(req_id): mark test as covering a specific requirement",
    "unit: marks unit tests (fast, no external dependencies)",
    "flaky: marks tests as flaky (retried automatically via pytest-rerunfailures)",
]
filterwarnings = [
    "ignore::DeprecationWarning:langchain.*",
    "ignore::DeprecationWarning:langgraph.*",
    "ignore::DeprecationWarning:langevals_*",
    "ignore::UserWarning:langchain.*",
    "ignore::ImportWarning:langgraph.*",

]

[tool.coverage.run]
source = ["backend"]
omit = [
    "tests/*",
    "backend/thinking_tree/*",
    "backend/system_team/*",
    "backend/main.py",
    "backend/checkpoint/*",
    "backend/rag/rag_store.py",
    "backend/graph/__init__.py",
    "backend/graph/agent_graph.py",
    "backend/graph/graph_state.py",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv", ".opencode"]
skips = [
    "B101",  # assert in tests
    "B102",  # exec in sandboxed tool code validator (empty __builtins__)
    "B104",  # 0.0.0.0 for Docker
    "B310",  # urllib.urlopen for trusted API endpoints, not arbitrary schemes
    "B311",  # pseudo-random ok
    "B608",  # parameterized SQL via text() + params=; false positive
]

[tool.coverage.report]
fail_under = 89
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]

