[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = []

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.11"
warn_unused_ignores = true
exclude = ["tests/"]

[tool.mypy."virtual_team/tasks.py"]
ignore_errors = true

[tool.mypy."virtual_team/main.py"]
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["virtual_team/tests"]
python_files = ["test_*.py"]
