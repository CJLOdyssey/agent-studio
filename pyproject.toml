[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "env: marks tests that need specific environment variables",
]
filterwarnings = [
    "ignore::DeprecationWarning:langchain.*",
    "ignore::DeprecationWarning:langgraph.*",
    "ignore::DeprecationWarning:langevals_*",
    "ignore::UserWarning:langchain.*",
    "ignore::ImportWarning:langgraph.*",

]

[tool.coverage.run]
source = ["virtual_team"]
omit = [
    "virtual_team/tests/*",
    "virtual_team/thinking_tree/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
