[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = []

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.11"
warn_unused_ignores = true
exclude = ["tests/"]

[[tool.mypy.overrides]]
module = "virtual_team.agent_graph"
ignore_errors = true

