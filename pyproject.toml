[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
"virtual_team/routers/*.py" = ["B008"]
"virtual_team/auth/auth_rbac.py" = ["F401"]
"tests/*.py" = ["E501", "SIM117", "N806"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]
python_version = "3.11"
warn_unused_ignores = true
exclude = ["tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "env: marks tests that need specific environment variables",
    "integration: marks tests that require a running backend + Docker stack (deselect with '-m \"not integration\"')",
]
filterwarnings = [
    "ignore::DeprecationWarning:langchain.*",
    "ignore::DeprecationWarning:langgraph.*",
    "ignore::DeprecationWarning:langevals_*",
    "ignore::UserWarning:langchain.*",
    "ignore::ImportWarning:langgraph.*",

]

[tool.coverage.run]
source = ["virtual_team"]
omit = [
    "tests/*",
    "virtual_team/thinking_tree/*",
    "virtual_team/routers/agent_test_handler.py",
    "virtual_team/tasks/prefix_completion.py",
]

[tool.bandit]
exclude_dirs = ["tests", ".venv", ".opencode"]
skips = ["B101", "B311"]  # assert allowed in tests, pseudo-random ok

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
