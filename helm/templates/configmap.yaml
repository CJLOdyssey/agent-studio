apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-studio.fullname" . }}-config
  labels:
    {{- include "agent-studio.labels" . | nindent 4 }}
data:
  PYTHONPATH: {{ .Values.backend.env.PYTHONPATH | quote }}
  DB_HOST: {{ .Values.backend.env.DB_HOST | default (include "agent-studio.postgres.fullname" .) | quote }}
  DB_PORT: {{ .Values.backend.env.DB_PORT | quote }}
  DB_USER: {{ .Values.backend.env.DB_USER | quote }}
  DATABASE_URL: {{ include "agent-studio.databaseUrl" . | quote }}
  REDIS_URL: {{ include "agent-studio.redisUrl" . | quote }}
  CELERY_BROKER_URL: {{ .Values.backend.env.CELERY_BROKER_URL | default (include "agent-studio.redisUrl" .) | quote }}
  CELERY_RESULT_BACKEND: {{ .Values.backend.env.CELERY_RESULT_BACKEND | default (include "agent-studio.redisUrl" .) | quote }}
  OPENAI_BASE_URL: {{ .Values.backend.env.OPENAI_BASE_URL | quote }}
  OPENAI_MODEL: {{ .Values.backend.env.OPENAI_MODEL | quote }}
  MAX_ROUNDS: {{ .Values.backend.env.MAX_ROUNDS | quote }}
  TEMPERATURE: {{ .Values.backend.env.TEMPERATURE | quote }}
  TIMEOUT: {{ .Values.backend.env.TIMEOUT | quote }}
  MAX_RETRIES: {{ .Values.backend.env.MAX_RETRIES | quote }}
  LOG_LEVEL: {{ .Values.backend.env.LOG_LEVEL | quote }}
  CHECKPOINTER_BACKEND: {{ .Values.backend.env.CHECKPOINTER_BACKEND | quote }}
  CHECKPOINTER_DSN: {{ include "agent-studio.checkpointerDsn" . | quote }}
  CORS_ORIGIN: {{ .Values.backend.env.CORS_ORIGIN | quote }}
  HTTP_PROXY: {{ .Values.backend.env.HTTP_PROXY | quote }}
  HTTPS_PROXY: {{ .Values.backend.env.HTTPS_PROXY | quote }}
  NO_PROXY: {{ .Values.backend.env.NO_PROXY | quote }}
  BAIDU_QIANFAN_API_KEY: {{ .Values.backend.env.BAIDU_QIANFAN_API_KEY | quote }}
