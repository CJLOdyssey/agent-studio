apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-studio.backend.fullname" . }}
  labels:
    {{- include "agent-studio.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "agent-studio.selectorLabels" . | nindent 6 }}
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "agent-studio.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      {{- if .Values.checkpoints.persistence.enabled }}
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: {{ include "agent-studio.fullname" . }}-checkpoints
      {{- end }}
      containers:
        - name: backend
          image: {{ include "agent-studio.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy | default "IfNotPresent" }}
          command: ["scripts/docker-entrypoint.sh"]
          args: ["uvicorn", "backend.core.app:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "agent-studio.fullname" . }}-config
            - secretRef:
                name: {{ include "agent-studio.fullname" . }}-secret
          {{- if .Values.checkpoints.persistence.enabled }}
          volumeMounts:
            - name: checkpoints
              mountPath: /app/data
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.securityContext.runAsUser }}
            runAsGroup: {{ .Values.securityContext.runAsGroup }}
            capabilities:
              {{- toYaml .Values.securityContext.capabilities | nindent 14 }}
          livenessProbe:
            httpGet:
              path: /api/models
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/models
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
