{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-studio.fullname" . }}-postgres
  labels:
    {{- include "agent-studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | required "postgres.password is required when postgres.enabled is true" | quote }}
{{- end }}
