apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-studio.fullname" . }}-secret
  labels:
    {{- include "agent-studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  KEY_VAULT_SECRET: {{ .Values.backend.secrets.keyVaultSecret | required "backend.secrets.keyVaultSecret is required" | quote }}
  AUTH_SECRET: {{ .Values.backend.secrets.authSecret | quote }}
  DEEPSEEK_API_KEY: {{ .Values.backend.secrets.deepseekApiKey | quote }}
