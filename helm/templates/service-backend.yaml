apiVersion: v1
kind: Service
metadata:
  name: {{ include "virtual-team.backend.fullname" . }}
  labels:
    {{- include "virtual-team.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "virtual-team.selectorLabels" . | nindent 4 }}
    component: backend
