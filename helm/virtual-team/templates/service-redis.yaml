{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "virtual-team.redis.fullname" . }}
  labels:
    {{- include "virtual-team.labels" . | nindent 4 }}
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "virtual-team.selectorLabels" . | nindent 4 }}
    component: redis
{{- end }}
