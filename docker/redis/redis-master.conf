# Redis master configuration
#
# Auth (requirepass / masterauth) is appended at container startup by the
# entrypoint.sh script when REDIS_PASSWORD is set.

# ---------------------------------------------------------------------------
# Persistence — RDB snapshotting
# ---------------------------------------------------------------------------
save 900 1
save 300 10
save 60 10000

# ---------------------------------------------------------------------------
# Persistence — AOF (append-only file)
# ---------------------------------------------------------------------------
appendonly yes
appendfsync everysec

# ---------------------------------------------------------------------------
# Memory management
# ---------------------------------------------------------------------------
maxmemory 256mb
maxmemory-policy allkeys-lru

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
bind 0.0.0.0
protected-mode no

# Log to stdout so Docker captures it
logfile ""
