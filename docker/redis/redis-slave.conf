# Redis slave (replica) configuration
#
# Auth (masterauth) is appended at container startup by the entrypoint.sh
# script when REDIS_PASSWORD is set.

# ---------------------------------------------------------------------------
# Replication
# ---------------------------------------------------------------------------
replicaof redis-master 6379
replica-read-only yes

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------
bind 0.0.0.0
protected-mode no

# Log to stdout so Docker captures it
logfile ""
