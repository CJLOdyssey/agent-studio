# Redis Sentinel configuration for virtual-team-redis
#
# Auth (requirepass / auth-pass) is appended at container startup by the
# entrypoint.sh script when REDIS_PASSWORD is set.

# ---------------------------------------------------------------------------
# Monitor configuration
# ---------------------------------------------------------------------------
sentinel monitor virtual-team-redis redis-master 6379 2
sentinel down-after-milliseconds virtual-team-redis 5000
sentinel failover-timeout virtual-team-redis 10000
sentinel parallel-syncs virtual-team-redis 1

# ---------------------------------------------------------------------------
# Sentinel behaviour
# ---------------------------------------------------------------------------
sentinel resolve-hostnames no
sentinel announce-hostnames no

# Log to stdout so Docker captures it
logfile ""
