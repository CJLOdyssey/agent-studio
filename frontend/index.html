<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="AgentStudio - AI Agent 协作工作站" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="/api" />
    <link rel="dns-prefetch" href="/api" />
    <script>
      (function(){
        try {
          var s = JSON.parse(localStorage.getItem('devagents-settings'));
          if (s && (s.theme === 'dark' || (s.theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches))) {
            document.documentElement.classList.add('dark');
          }
        } catch(e){}
      })();
    </script>
    <title>AgentStudio</title>
  </head>
  <body>
    <a href="#main-content" class="skip-link">跳到主内容</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
