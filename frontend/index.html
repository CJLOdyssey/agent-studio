<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1117" />
    <meta name="description" content="AgentStudio - AI Agent 协作工作站" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="/api" />
    <link rel="dns-prefetch" href="/api" />
    <script>
      (function(){
        try {
          var s = JSON.parse(localStorage.getItem('agentstudio-settings'));
          var theme = s && s.theme ? s.theme : 'dark';
          if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e){}
      })();
    </script>
    <style>
      html { background: #f5f5f7; }
      html.dark { background: #0f1117; }
    </style>
    <title>AgentStudio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
