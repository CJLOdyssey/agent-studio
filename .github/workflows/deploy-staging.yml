name: Deploy to Staging

on:
  push:
    branches: [staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  REMOTE_DIR: /opt/virtual-team-staging

jobs:
  # ── Build & Push (same as production, but staged) ──────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:staging-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:staging

      - name: Build & push celery (staging)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:staging-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:staging

      - name: Build & push frontend (staging)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:staging-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:staging

  # ── Deploy to staging server ─────────────────────────────────────────────
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      REMOTE_SSH_HOST: ${{ secrets.REMOTE_SSH_HOST_STAGING || secrets.REMOTE_SSH_HOST }}
      REMOTE_SSH_PORT: ${{ secrets.REMOTE_SSH_PORT || '22' }}
      REMOTE_SSH_USER: ${{ secrets.REMOTE_SSH_USER || 'deploy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.REMOTE_SSH_HOST }}
          port: ${{ env.REMOTE_SSH_PORT }}
          username: ${{ env.REMOTE_SSH_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          source: "docker/,frontend/Dockerfile,frontend/nginx.conf,.env.example"
          target: ${{ env.REMOTE_DIR }}
          strip_components: 0

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.REMOTE_SSH_HOST }}
          port: ${{ env.REMOTE_SSH_PORT }}
          username: ${{ env.REMOTE_SSH_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          script: |
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username ${{ secrets.ACR_USERNAME }} --password-stdin ${{ env.REGISTRY }}
            cd ${{ env.REMOTE_DIR }}

            # Pull staging images
            BACKEND_TAG=staging CELERY_TAG=staging FRONTEND_TAG=staging \
              docker compose -f docker/compose.prod.yml pull
            docker compose -f docker/compose.prod.yml up -d --force-recreate
            docker image prune -f

            # Wait for health
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "✅ Staging backend healthy"
                break
              fi
              sleep 2
            done

  # ── Smoke tests ──────────────────────────────────────────────────────────
  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    env:
      REMOTE_SSH_HOST: ${{ secrets.REMOTE_SSH_HOST_STAGING || secrets.REMOTE_SSH_HOST }}
      REMOTE_SSH_PORT: ${{ secrets.REMOTE_SSH_PORT || '22' }}
      REMOTE_SSH_USER: ${{ secrets.REMOTE_SSH_USER || 'deploy' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - run: pip install -r requirements-lock.txt --quiet

      - name: Set up SSH tunnel to staging
        env:
          STAGING_SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh -i ~/.ssh/staging_key -o StrictHostKeyChecking=no \
            -p "${REMOTE_SSH_PORT}" -N -L 8080:localhost:8080 \
            "${REMOTE_SSH_USER}@${REMOTE_SSH_HOST}" &
          SSH_PID=$!
          echo "SSH_PID=$SSH_PID" >> $GITHUB_ENV
          sleep 3

      - name: Run E2E smoke tests
        run: |
          PYTHONPATH=. \
          AUTH_MODE=legacy \
          CHECKPOINTER_BACKEND=memory \
          RATE_LIMIT=9999 \
          REDIS_URL=redis://localhost:6379/1 \
          AUTH_SECRET=ci-test-secret \
          python3 -m pytest tests/e2e/test_e2e_full_flow.py -v --tb=short \
            -k "not run" \
            --timeout=120

      - name: Cleanup SSH tunnel
        if: always()
        run: kill $SSH_PID 2>/dev/null || true

  # ── Report status ────────────────────────────────────────────────────────
  staging-passed:
    name: "Staging Deploy Passed"
    if: always()
    needs:
      - deploy-staging
      - smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.deploy-staging.result }}" != "success" ]] ||
             [[ "${{ needs.smoke-test.result }}" != "success" ]]; then
            echo "❌ Staging deployment or smoke tests failed"
            exit 1
          fi
          echo "✅ Staging ready for promotion to main"
