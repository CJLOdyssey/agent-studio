name: Build CI Runner Image

on:
  schedule:
    - cron: '0 6 * * 0'  # Weekly Sunday 06:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - requirements-lock.txt
      - frontend/package-lock.json
      - .github/ci-image/Dockerfile

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ lower(github.repository) }}/ci-runner
  IMAGE_NAME: ${{ github.repository }}/ci-runner

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push CI runner image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/ci-image/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
