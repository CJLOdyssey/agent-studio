name: Sync Docs

on:
  schedule:
    - cron: '0 6 * * 1'  # 每周一 06:00 UTC
  workflow_dispatch:       # 可手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt

      - name: Auto-fix AGENTS.md / CLAUDE.md counts
        id: fix
        run: |
          # 先检查当前状态
          before=$(git diff --name-only)
          bash scripts/sync-docs.sh
          after=$(git diff --name-only)
          if [ "$before" != "$after" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.fix.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: sync AGENTS.md/CLAUDE.md with codebase'
          title: 'chore: sync project docs with codebase'
          body: |
            ## 自动文档同步

            CI 检测到 `AGENTS.md` / `CLAUDE.md` 与实际代码不一致，已自动修正。

            **检查项：**
            - routers 数量
            - repository 数量
            - DB models 数量
            - workstation 模块数量

            请 review 后合并。
          branch: bot/sync-docs
          base: main
          delete-source-branch: true
