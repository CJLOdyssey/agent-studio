name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      target:
        description: '部署目标'
        required: true
        default: 'prod'
        type: choice
        options: [staging, prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  REMOTE_DIR: /opt/virtual-team
  REMOTE_SSH_HOST: ${{ secrets.REMOTE_SSH_HOST || secrets.REMOTE_HOST }}
  REMOTE_SSH_PORT: ${{ secrets.REMOTE_SSH_PORT || '22' }}
  REMOTE_SSH_USER: ${{ secrets.REMOTE_SSH_USER || 'deploy' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:latest

      - name: Build & push celery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for CI to pass
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-regexp: 'CI Passed'
          wait-interval: 30
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ╔════════════════════════════════════════════════════════════════════════╗
      # ║   ⚠️ 重 要 安 全 提 示 ⚠️                                            ║
      # ║   下方使用 SSH Key 直连生产服务器。                                    ║
      # ║   私钥存储在 GitHub Secrets → REMOTE_SSH_KEY。                         ║
      # ║   服务器端对应公钥须写入 ~/.ssh/authorized_keys。                       ║
      # ║   任何 AI 或开发者使用这段配置前，必须、一定、务必先获得用户明确授权！      ║
      # ║   误操作可能导致生产环境宕机、数据丢失或安全泄露。                        ║
      # ╚════════════════════════════════════════════════════════════════════════╝
      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.REMOTE_SSH_HOST }}
          port: ${{ env.REMOTE_SSH_PORT }}
          username: ${{ env.REMOTE_SSH_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          source: "docker/,frontend/Dockerfile,frontend/nginx.conf,.env.example"
          target: ${{ env.REMOTE_DIR }}
          strip_components: 0

      # ╔════════════════════════════════════════════════════════════════════════╗
      # ║   ⚠️ 重 要 安 全 提 示 ⚠️                                            ║
      # ║   下方通过 SSH Key 登录并操作生产服务器。                                ║
      # ║   执行 `docker compose pull && up -d --force-recreate` 会直接          ║
      # ║   影响生产环境运行中的容器。任何时候执行此步骤前，必须获得用户明确确认！    ║
      # ║   禁止在未告知用户的情况下触发此工作流或任何 SSH 操作。                   ║
      # ╚════════════════════════════════════════════════════════════════════════╝
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.REMOTE_SSH_HOST }}
          port: ${{ env.REMOTE_SSH_PORT }}
          username: ${{ env.REMOTE_SSH_USER }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          host: ${{ env.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          # Rollback: change the sha tag in docker compose and re-deploy
          # docker compose -f docker/compose.prod.yml up -d --force-recreate
          script: |
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username ${{ secrets.ACR_USERNAME }} --password-stdin ${{ env.REGISTRY }}
            cd ${{ env.REMOTE_DIR }}
            docker compose -f docker/compose.prod.yml pull
            docker compose -f docker/compose.prod.yml up -d --force-recreate
            docker image prune -f

      - name: Post-deploy smoke test
        run: |
          echo "Waiting for services to start..."
          sleep 30
          for i in $(seq 1 5); do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://${{ env.REMOTE_SSH_HOST }}:8080/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

