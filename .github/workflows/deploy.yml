name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:latest
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: docker
    runs-on: self-hosted
    steps:
      - name: Checkout via SSH
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_github
          cd /home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team
          git remote set-url origin git@github.com:CJLOdyssey/virtual-software-team.git
          git fetch --depth=1 origin main
          git reset --hard origin/main

      - name: Pull and restart services
        run: |
          cd /home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team
          docker compose pull
          docker compose down --remove-orphans || true
          docker compose up -d
          docker image prune -f
          echo "✅ Deploy complete"
          docker compose ps

      - name: Notify deploy result
        if: always()
        run: |
          STATUS='success'
          [ '${{ job.status }}' != 'success' ] && STATUS='failure'
          curl -s -X POST '${{ secrets.DEPLOY_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "🚀 部署 $STATUS",
                "text": "### 🚀 虚拟团队部署\n\n- **状态**: '$STATUS'\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **触发**: ${{ github.actor }}\n- [查看运行](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            }' || echo "⚠️ Webhook notification skipped (DEPLOY_WEBHOOK_URL not configured)"
