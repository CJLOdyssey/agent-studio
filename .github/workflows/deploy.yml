name: Build & Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  REMOTE_DIR: /opt/virtual-team
  REMOTE_HOST: 39.108.61.123

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:latest

      - name: Build & push celery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        # 同步最新代码和配置文件到服务器
        with:
          host: ${{ env.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker/,frontend/Dockerfile,frontend/nginx.conf,.env.example"
          target: ${{ env.REMOTE_DIR }}
          strip_components: 0

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username ${{ secrets.ACR_USERNAME }} --password-stdin ${{ env.REGISTRY }}
            cd ${{ env.REMOTE_DIR }}
            docker compose -f docker/compose.prod.yml pull
            docker compose -f docker/compose.prod.yml up -d --force-recreate
            docker image prune -f
