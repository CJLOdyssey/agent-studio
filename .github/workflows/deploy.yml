name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── CI Gate: only deploy if CI passed for this commit ─────────────
  ci-check:
    name: 🔑 CI Gate
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Check CI workflow status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh run list \
            --workflow ci.yml \
            --commit ${{ github.sha }} \
            --json conclusion,status \
            --jq '.[0] // empty' \
            --limit 1 2>/dev/null)

          if [ -z "$RESULT" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "⚠️  手动触发，未找到对应 CI 运行记录 — 继续部署"
              exit 0
            fi
            echo "❌ 未找到 CI 运行记录 — 请先确保 CI 通过"
            exit 1
          fi

          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion // "null"')
          STATUS=$(echo "$RESULT" | jq -r '.status // "null"')
          echo "CI: status=$STATUS / conclusion=$CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "✅ CI 通过 — 继续部署"
          elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
            echo "❌ CI 失败 ($CONCLUSION) — 终止部署"
            exit 1
          elif [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ]; then
            echo "⏳ CI 仍在运行 ($STATUS) — 等待 CI 完成后重试部署"
            exit 1
          else
            echo "❌ CI 状态异常 ($STATUS/$CONCLUSION) — 终止部署"
            exit 1
          fi

  # ── Build Docker image and push to GHCR ──────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    needs: ci-check
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repo
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}:latest
            ghcr.io/${{ env.REPO_LOWER }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to ECS ────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    needs: docker
    if: success()
    runs-on: self-hosted
    steps:
      - name: Checkout via SSH
        run: |
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_github
          git -C /home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team \
            remote set-url origin git@github.com:CJLOdyssey/virtual-software-team.git
          git -C /home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team \
            fetch --depth=1 origin main
          git -C /home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team \
            reset --hard origin/main

      - name: Build frontend
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          WORK_DIR="/home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team"
          cd "$WORK_DIR/frontend"
          npm ci --legacy-peer-deps || npm install --legacy-peer-deps
          npm run build
          echo "✅ Frontend built"

      - name: Pull and restart services
        run: |
          WORK_DIR="/home/odyssey/actions-runner/_work/virtual-software-team/virtual-software-team"
          ENV_SRC="/mnt/d/PyCharmProjects/Agent/projects/项目 7：虚拟软件外包团队/.env"

          # 复制 .env 到工作目录（docker compose 需要环境变量）
          [ -f "$ENV_SRC" ] && cp "$ENV_SRC" "$WORK_DIR/.env"

          cd "$WORK_DIR"
          # 构建 api/celery_worker 镜像 + 拉取外部镜像
          docker compose -p 7 build api celery_worker
          docker compose -p 7 pull
          docker compose -p 7 up -d --remove-orphans
          docker image prune -f
          echo "✅ Deploy complete"
          docker compose -p 7 ps

      - name: Notify deploy result
        if: always()
        run: |
          STATUS='success'
          [ '${{ job.status }}' != 'success' ] && STATUS='failure'
          curl -s -X POST '${{ secrets.DEPLOY_WEBHOOK_URL }}' \
            -H 'Content-Type: application/json' \
            -d '{
              "msgtype": "markdown",
              "markdown": {
                "title": "🚀 部署 $STATUS",
                "text": "### 🚀 虚拟团队部署\n\n- **状态**: '\''$STATUS'\''\n- **分支**: ${{ github.ref_name }}\n- **提交**: ${{ github.sha }}\n- **触发**: ${{ github.actor }}\n- [查看运行](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
              }
            }' || echo "⚠️ Webhook notification skipped (DEPLOY_WEBHOOK_URL not configured)"
