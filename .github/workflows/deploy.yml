name: Build & Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: crpi-j0fhvkobexa3ilkn.cn-shenzhen.personal.cr.aliyuncs.com
  NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
  REMOTE_DIR: /opt/virtual-team
  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/backend:latest

      - name: Build & push celery
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/celery:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ╔════════════════════════════════════════════════════════════════════════╗
      # ║   ⚠️ 重 要 安 全 提 示 ⚠️                                            ║
      # ║   下方使用 ${{ secrets.SERVER_PASSWORD }} 通过 SSH 直连生产服务器。        ║
      # ║   任何 AI 或开发者使用这段配置前，必须、一定、务必先获得用户明确授权！      ║
      # ║   误操作可能导致生产环境宕机、数据丢失或安全泄露。                        ║
      # ╚════════════════════════════════════════════════════════════════════════╝
      - name: Sync files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker/,frontend/Dockerfile,frontend/nginx.conf,.env.example"
          target: ${{ env.REMOTE_DIR }}
          strip_components: 0

      # ╔════════════════════════════════════════════════════════════════════════╗
      # ║   ⚠️ 重 要 安 全 提 示 ⚠️                                            ║
      # ║   下方通过 SSH + SERVER_PASSWORD / ACR_PASSWORD 登录并操作生产服务器。    ║
      # ║   执行 `docker compose pull && up -d --force-recreate` 会直接          ║
      # ║   影响生产环境运行中的容器。任何时候执行此步骤前，必须获得用户明确确认！    ║
      # ║   禁止在未告知用户的情况下触发此工作流或任何 SSH 操作。                   ║
      # ╚════════════════════════════════════════════════════════════════════════╝
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.REMOTE_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "${{ secrets.ACR_PASSWORD }}" | docker login --username ${{ secrets.ACR_USERNAME }} --password-stdin ${{ env.REGISTRY }}
            cd ${{ env.REMOTE_DIR }}
            docker compose -f docker/compose.prod.yml pull
            docker compose -f docker/compose.prod.yml up -d --force-recreate
            docker image prune -f

