# ── CI: 极致优化 — 4 个并行 job，无等待依赖 ──────────────────────────
# 所有 lint/typecheck/test 都在同一 runner 上顺序执行，
# 共享同一份 pip install / npm ci，消除跨 job 等待和依赖安装开销。
# ──────────────────────────────────────────────────────────────────────────────

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ═══ Backend: ruff → mypy → bandit → pytest (同一 runner) ═══════════════
  backend:
    name: ✅ Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt mypy bandit diff-cover
      - name: 🔍 Lint (ruff)
        uses: astral-sh/ruff-action@v1
        with:
          args: check virtual_team/ tests/ alembic/
      - name: 🧩 Type Check (mypy)
        run: mypy virtual_team/ --ignore-missing-imports
      - name: 🛡️ Security (bandit)
        run: bandit -r virtual_team/ -ll -s B104,B310,B608
      - name: ✅ Tests + coverage
        run: python -m pytest tests/ -v --tb=short --cov-report=xml
      - name: 📊 Diff coverage check
        run: |
          git fetch origin main --depth=100
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=100 || echo "⚠️ diff-cover 跳过（非 PR 环境）"

  # ═══ Frontend: format → lint → typecheck → audit → test (同一 runner) ═══
  frontend:
    name: ✅ Frontend (lint + test)
    if: ${{ contains(github.event.pull_request.changed_files, 'frontend/') || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: 🎨 Format check
        run: npm run format:check
      - name: 🔍 Lint
        run: npm run lint
      - name: 🧩 Type check
        run: npm run typecheck
      - name: 🛡️ Security audit
        run: npm audit --audit-level=high --production || echo "⚠️ 安全警告（非阻塞）"
      - name: ✅ Tests
        run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

  # ═══ Integration (需要真实数据库) ═══════════════════════════════════════════
  integration:
    name: 🔄 Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: virtual_team
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/test_integration.py tests/test_user_flow.py -v --tb=short

  # ═══ Build (前端构建) ═══════════════════════════════════════════════════════
  build:
    name: 📦 Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
