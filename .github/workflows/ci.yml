name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint

  frontend-test:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run test:coverage

  frontend-build:
    name: "Frontend: Build & Bundle"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - name: Check bundle size
        run: |
          total=$(du -sb dist/ | cut -f1)
          max=$((10 * 1024 * 1024))
          echo "Bundle size: $(numfmt --to=iec $total)"
          if [ "$total" -gt "$max" ]; then
            echo "❌ Bundle size exceeds 10 MB"
            exit 1
          fi
          echo "✅ Bundle size OK"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Backend Lint & Security ──────────────────────────────────────────────
  backend-lint:
    name: "Backend: Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: ruff check backend/
      - run: mypy backend/ --strict --no-error-summary

  backend-security:
    name: "Backend: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip-audit --strict --progress-spinner=off -r requirements-lock.txt
      - run: "bandit -c pyproject.toml -r backend/ -ll 2>&1 || echo 'Warning: bandit found issues (non-blocking)'"

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: "Backend: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run unit tests
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -q --tb=short \
            --ignore=tests/e2e/ \
            -m 'not integration' \
            --ignore=tests/broker/ \
            --ignore=tests/test_requirement_markers.py \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=89 \
            --reruns 2 \
            --reruns-delay 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Diff Coverage (Change Coverage) ──────────────────────────────────────
  diff-coverage:
    name: "Backend: Diff Coverage"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff comparison
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Run diff-cover
        run: |
          echo "📊 Checking diff coverage against ${{ github.base_ref }}..."
          git diff origin/${{ github.base_ref }}...HEAD -- backend/ ':!backend/system_team' > /tmp/filtered.diff
          diff-cover coverage.xml \
            --diff-file /tmp/filtered.diff \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --diff-range-notation '..'
      - name: Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Get diff-cover output
            let diffCoverOutput = '';
            try {
              diffCoverOutput = execSync(
                'diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=70 --report-uncovered',
                { encoding: 'utf-8' }
              );
            } catch (error) {
              diffCoverOutput = error.stdout || 'Error running diff-cover';
            }

            const body = `## ⚠️ Diff Coverage Check Failed

            Your changes have **insufficient test coverage**.

            \`\`\`
            ${diffCoverOutput}
            \`\`\`

            **Requirements:**
            - New/modified code must have at least **70%** test coverage
            - Add tests for uncovered lines before merging

            *This check ensures code quality and prevents untested changes from being merged.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: "Integration (${{ matrix.auth_mode }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Preflight check
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/backend PYTHONPATH=. python3 scripts/preflight.py
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run E2E tests
        run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret python3 -m pytest tests/e2e/test_e2e_full_flow.py -v --tb=short --reruns 2 --reruns-delay 5
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── Docs & Config ────────────────────────────────────────────────────────
  docs-check:
    name: "Docs & Config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: node scripts/check-docs.js
      - run: python3 scripts/check-ci-docs.py

  # ── Requirement Coverage ─────────────────────────────────────────────────
  requirement-coverage:
    name: "Backend: Requirement Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run tests with requirement markers
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            --ignore=tests/test_requirement_markers.py \
            --ignore=tests/broker/ \
            --requirement-coverage \
            -m "not integration" \
            --ignore=tests/e2e/ \
            --ignore=tests/repository/ \
            --ignore=tests/routers/auth/test_auth_api.py \
            -q --tb=short

  # ── Mutation Tests ─────────────────────────────────────────────────────────
  mutation-test:
    name: "Backend: Mutation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install "mutmut==2.5.1" --quiet
      - name: Run mutation tests
        timeout-minutes: 8
        run: |
          PYTHONPATH=. mutmut run \
            --paths-to-mutate "backend/core/infra/database.py,backend/routers/skills.py,backend/routers/mcps.py" \
            --tests-dir tests/ \
            --CI \
            --runner "python3 -m pytest tests/core/infra/test_database.py tests/routers/test_routers_skills.py tests/routers/test_routers_mcps.py -q --tb=short -x"
      - name: Show mutation score
        if: always()
        run: mutmut results

  # ── Load Tests ─────────────────────────────────────────────────────────────
  load-test:
    name: "Backend: Load Test"
    runs-on: ubuntu-latest
    continue-on-error: true  # 首次集成，允许失败
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install locust --quiet
      - name: Verify locustfile
        run: |
          echo "Load test CI integration — placeholder (needs running backend)"
          echo "Future: locust --headless --users 10 --spawn-rate 1 --run-time 30s"
          test -f tests/loadtests/locustfile.py && echo "locustfile exists"

  # ── Final Gate ────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI Passed"
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - backend-lint
      - backend-security
      - backend-test
      - diff-coverage
      - integration
      - docs-check
      - requirement-coverage
      - mutation-test
      - load-test
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-test.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-build.result }}" != "success" ]] ||
             [[ "${{ needs.backend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.backend-test.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.docs-check.result }}" != "success" ]] ||
             [[ "${{ needs.requirement-coverage.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          # diff-coverage only runs on PRs, skip if skipped
          if [[ "${{ needs.diff-coverage.result }}" == "failure" ]]; then
            echo "❌ Diff coverage check failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
