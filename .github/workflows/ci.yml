name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Enterprise: explicit permissions (least-privilege principle).
# For same-repo PRs, GITHUB_TOKEN can write PR comments.
# For fork PRs, GitHub denies write permissions — this is by design,
# not a bug. The comment steps have continue-on-error to handle that.
permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint

  frontend-test:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm test

  frontend-build:
    name: "Frontend: Build & Bundle"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - name: Check bundle size
        run: |
          total=$(du -sb dist/ | cut -f1)
          max=$((10 * 1024 * 1024))
          echo "Bundle size: $(numfmt --to=iec $total)"
          if [ "$total" -gt "$max" ]; then
            echo "❌ Bundle size exceeds 10 MB"
            exit 1
          fi
          echo "✅ Bundle size OK"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Secrets Scan ─────────────────────────────────────────────────────────
  secrets-scan:
    name: "Security: Secrets Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container Scan ──────────────────────────────────────────────────────
  container-scan:
    name: "Security: Container Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan docker/Dockerfile
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: config
          scan-ref: docker/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Scan frontend/Dockerfile
        uses: aquasecurity/trivy-action@v0.29.0
        with:
          scan-type: config
          scan-ref: frontend/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 0

  # ── Backend Lint & Security ──────────────────────────────────────────────
  backend-lint:
    name: "Backend: Lint & Typecheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: ruff check backend/
      - run: mypy backend/ --strict --no-error-summary

  backend-security:
    name: "Backend: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip-audit --strict --progress-spinner=off -r requirements-lock.txt
      - run: bandit -c pyproject.toml -r backend/ -ll

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: "Backend: Tests + Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: "Backend: Tests (${{ matrix.shard }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [routers, core]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run unit tests
        run: |
          if [ "${{ matrix.shard }}" = "routers" ]; then
            DIRS="tests/routers/ tests/repository/ tests/orm/"
          else
            DIRS="tests/ --ignore=tests/routers/ --ignore=tests/repository/ --ignore=tests/orm/ --ignore=tests/e2e/ --ignore=tests/broker/ --ignore=tests/test_requirement_markers.py --ignore=tests/routers/auth/test_auth_routers.py"
          fi
          PYTHONPATH=. python3 -m pytest $DIRS -q --tb=short -m 'not integration' --ignore=tests/e2e/ --ignore=tests/broker/ --ignore=tests/test_requirement_markers.py --ignore=tests/routers/auth/test_auth_routers.py

  # ── Backend Coverage ──────────────────────────────────────────────────────
  backend-coverage:
    name: "Backend: Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run tests with coverage
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -q --tb=short \
            --ignore=tests/e2e/ \
            -m 'not integration' \
            --ignore=tests/broker/ \
            --ignore=tests/test_requirement_markers.py \
            --ignore=tests/routers/auth/test_auth_routers.py \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=89 \
            --reruns 2 \
            --reruns-delay 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Frontend Coverage ────────────────────────────────────────────────────
  frontend-coverage:
    name: "Frontend: Coverage"
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run test:coverage

  # ── Diff Coverage (Change Coverage) ──────────────────────────────────────
  diff-coverage:
    name: "Backend: Diff Coverage"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: backend-coverage
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff comparison
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Run diff-cover
        run: |
          echo "📊 Checking diff coverage against ${{ github.base_ref }}..."
          git diff origin/${{ github.base_ref }}...HEAD -- backend/ ':!backend/system_team' > /tmp/filtered.diff
          diff-cover coverage.xml \
            --diff-file /tmp/filtered.diff \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --diff-range-notation '..'
      - name: Comment on PR
        if: failure()
        continue-on-error: true  # GitHub denies write to fork PRs — by design, not a bug
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Get diff-cover output
            let diffCoverOutput = '';
            try {
              diffCoverOutput = execSync(
                'diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=70 --show-uncovered',
                { encoding: 'utf-8' }
              );
            } catch (error) {
              diffCoverOutput = error.stdout || error.stderr || 'Error running diff-cover';
            }

            const body = `## ⚠️ Diff Coverage Check Failed

            Your changes have **insufficient test coverage**.

            \`\`\`
            ${diffCoverOutput}
            \`\`\`

            **Requirements:**
            - New/modified code must have at least **70%** test coverage
            - Add tests for uncovered lines before merging

            *This check ensures code quality and prevents untested changes from being merged.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── OpenAPI Diff ──────────────────────────────────────────────────────────
  openapi-diff:
    name: "OpenAPI: Schema Validation"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Validate OpenAPI schema
        run: |
          curl -sf http://localhost:8080/openapi.json | python3 -m json.tool > /dev/null || { echo "❌ Invalid OpenAPI JSON"; exit 1; }
          curl -s http://localhost:8080/openapi.json | python3 -c "
          import json, sys
          schema = json.load(sys.stdin)
          assert 'openapi' in schema, 'Missing openapi version'
          assert 'paths' in schema, 'Missing paths'
          paths = schema['paths']
          assert '/api/health' in paths, 'Missing /api/health'
          assert '/api/agents' in paths, 'Missing /api/agents'
          assert '/api/tools' in paths, 'Missing /api/tools'
          assert '/api/sessions' in paths, 'Missing /api/sessions'
          print(f'✅ OpenAPI valid — {len(paths)} paths')
          "
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: "Integration (${{ matrix.auth_mode }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Preflight check
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/backend PYTHONPATH=. python3 scripts/preflight.py
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run E2E tests
        run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret python3 -m pytest tests/e2e/test_e2e_full_flow.py -v --tb=short --reruns 2 --reruns-delay 5
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── E2E Smoke Tests ─────────────────────────────────────────────────────
  frontend-e2e:
    name: "Frontend: E2E Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install playwright --quiet
      - run: python3 -m playwright install chromium --with-deps
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend-e2e.log 2>&1 &
          echo "BACKEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then break; fi
            sleep 1
          done
      - name: Start frontend dev server
        working-directory: frontend
        run: |
          npm ci --prefer-offline --no-audit
          npx vite --port 5173 &
          echo "FRONTEND_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then break; fi
            sleep 1
          done
      - name: Run smoke tests
        run: PYTHONPATH=. python3 frontend/e2e/smoke_tests.py 2>&1 | tail -30
      - name: Stop services
        if: always()
        run: kill $BACKEND_PID $FRONTEND_PID 2>/dev/null || true

  # ── Docs & Config ────────────────────────────────────────────────────────
  docs-check:
    name: "Docs & Config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - run: node scripts/check-docs.js
      - run: python3 scripts/check-ci-docs.py

  # ── Requirement Coverage ─────────────────────────────────────────────────
  requirement-coverage:
    name: "Backend: Requirement Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run tests with requirement markers
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            --ignore=tests/test_requirement_markers.py \
            --ignore=tests/broker/ \
            --requirement-coverage \
            -m "not integration" \
            --ignore=tests/e2e/ \
            --ignore=tests/repository/ \
            --ignore=tests/routers/auth/test_auth_routers.py \
            --ignore=tests/routers/auth/test_auth_api.py \
            -q --tb=short

  # ── Flaky Tests ──────────────────────────────────────────────────────────
  flaky-check:
    name: "Backend: Flaky Tests"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Collect flaky tests
        id: collect
        run: |
          COUNT=$(PYTHONPATH=. python3 -m pytest tests/ --collect-only -m flaky -q 2>/dev/null | tail -1 | grep -oP '^\d+' || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Collected $COUNT flaky test(s)"
      - name: Run flaky tests
        if: steps.collect.outputs.count != '0'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -m flaky \
            -q --tb=short \
            --reruns 3 \
            --reruns-delay 5 \
            --ignore=tests/e2e/ \
            --ignore=tests/broker/ \
            --ignore=tests/test_requirement_markers.py
      - name: Report flaky count
        if: always()
        run: |
          echo "Flaky tests collected: ${{ steps.collect.outputs.count }}"
          echo "Note: flaky-check is advisory (continue-on-error)"

  # ── Load Tests ─────────────────────────────────────────────────────────────
  load-test:
    name: "Backend: Load Test"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install locust --quiet
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run load test
        run: |
          # Minimal load test — verify backend handles concurrent requests
          cat > /tmp/smoke_locust.py << 'PYEOF'
          from locust import HttpUser, task, between
          class SmokeUser(HttpUser):
              wait_time = between(0.1, 0.5)
              @task
              def health(self): self.client.get("/api/health")
              @task
              def models(self): self.client.get("/api/models")
          PYEOF
          locust --headless --users 5 --spawn-rate 1 --run-time 10s \
            --host http://localhost:8080 --exit-code-on-error 0 \
            -f /tmp/smoke_locust.py 2>&1 | tail -5
          echo "✅ Load test completed"
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── Final Gate ────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI Passed"
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - secrets-scan
      - container-scan
      - backend-lint
      - backend-security
      - backend-test
      - backend-coverage
      - frontend-coverage
      - diff-coverage
      - openapi-diff
      - integration
      - docs-check
      - load-test
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-test.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-build.result }}" != "success" ]] ||
             [[ "${{ needs.secrets-scan.result }}" != "success" ]] ||
             [[ "${{ needs.backend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.backend-security.result }}" != "success" ]] ||
             [[ "${{ needs.backend-test.result }}" != "success" ]] ||
             [[ "${{ needs.backend-coverage.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-coverage.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
