# ── CI: Enterprise-grade pipeline ──────────────────────────────────────────
# Phases run as fast as dependencies allow — each job is an independent
# status check for branch protection.  Coverage / lint / typecheck all
# report individually so reviewers can see what passed and what didn't.
#
#   Phase 0: Format (frontend prettier)          ← fastest gate
#   Phase 1: Lint + Typecheck + Security (parallel)
#   Phase 2: Unit Tests (parallel)               ← gated by Phase 1
#   Phase 3: Integration + Build                 ← gated by Phase 2
#   Phase 4: E2E                                 ← gated by Phase 3
#   Phase 5: Summary                             ← branch protection target
# ────────────────────────────────────────────────────────────────────────────

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

# ────────────────────────────────────────────────────────────────────────────
jobs:
  # === Phase 0: Fastest gates ==============================================
  format-check:
    name: 🎨 Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check

  # === Phase 1: Lint / Typecheck / Security (parallel) =====================
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v1
        with:
          args: check virtual_team/ tests/ alembic/

  backend-typecheck:
    name: 🧩 Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt mypy
      - name: Run mypy
        run: mypy virtual_team/ --ignore-missing-imports

  backend-security:
    name: 🛡️ Backend Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install --quiet bandit
      - name: Run bandit
        run: bandit -r virtual_team/ -ll -s B104,B310,B608

  frontend-lint:
    name: 🔍 Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  frontend-audit:
    name: 🛡️ Frontend Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high --production || echo "⚠️ 安全警告（非阻塞）"

  # === Phase 2: Unit Tests (parallel, gated by lint/typecheck) ==============
  backend-test:
    name: ✅ Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage gate
        run: python -m pytest tests/ -v --tb=short --cov-fail-under=60
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml

  frontend-test:
    name: ✅ Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/

  # === Phase 3: Integration + Build ========================================
  backend-integration:
    name: 🔄 Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: virtual_team
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/test_integration.py tests/test_user_flow.py -v --tb=short

  build:
    name: 📦 Frontend Build
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
          retention-days: 1

  # === Phase 4: Heavy =====================================================
  e2e:
    name: 🧪 E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [backend-integration, build]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: virtual_team
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: |
          pip install --quiet --upgrade pip
          pip install -r requirements.txt playwright
          cd frontend && npm ci
      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps
      - name: Start backend & frontend, then run E2E
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team
          OPENAI_API_KEY: skip
          DEEPSEEK_API_KEY: skip
        run: |
          REPO_ROOT="$GITHUB_WORKSPACE"
          # 启动后端
          uvicorn virtual_team.app:app --host 0.0.0.0 --port 8080 &
          for i in $(seq 1 30); do
            curl -s http://localhost:8080/api/health >/dev/null 2>&1 && break
            sleep 1
          done
          # 启动前端 dev server
          cd "$REPO_ROOT/frontend" && npx vite --host 0.0.0.0 --port 5173 &
          for i in $(seq 1 30); do
            curl -s http://localhost:5173 >/dev/null 2>&1 && break
            sleep 1
          done
          cd "$REPO_ROOT" && python frontend/e2e/smoke_tests.py

  # === Phase 5: Summary — single check target for branch protection =======
  summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs:
      - format-check
      - backend-lint
      - backend-typecheck
      - backend-security
      - frontend-lint
      - frontend-audit
      - backend-test
      - frontend-test
      - backend-integration
      - build
      - e2e
    if: success()
    steps:
      - run: echo "✅ All CI checks passed — ready for review/merge"
