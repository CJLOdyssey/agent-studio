name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt -r requirements-test.txt
      - run: ruff check virtual_team/
      - run: mypy virtual_team/ --strict
      - run: PYTHONPATH=. python3 -m pytest virtual_team/ -v --tb=short --ignore=virtual_team/tests/test_e2e_full_flow.py --cov=virtual_team --cov-report=term --cov-fail-under=25

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: virtual_team
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-test.txt
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory nohup python3 -m uvicorn virtual_team.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          sleep 3
          # Wait for backend to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/api/models > /dev/null 2>&1 && break
            sleep 2
          done
      - run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory python3 -m pytest virtual_team/tests/test_e2e_full_flow.py -v --tb=short

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Run module consistency check
        run: node scripts/check-docs.js
      - name: Verify .env.example covers all env vars
        run: |
          vars_in_code=$(grep -ohRE 'os\.environ\.get\(["'"'"']?[A-Z_]+' virtual_team/*.py | grep -oP '[A-Z_]+' | sort -u)
          missing=""
          for var in $vars_in_code; do
            grep -q "^$var=" .env.example || missing="$missing $var"
          done
          if [ -n "$missing" ]; then
            echo "❌ Variables missing from .env.example:$missing"
            exit 1
          fi
          echo "✅ All env vars covered in .env.example"
      - name: Verify AGENTS.md counts match codebase
        run: |
          errors=0
          # Routers
          actual_routers=$(ls virtual_team/routers/*.py | grep -v __init__ | wc -l)
          expected_routers=$(grep -oP 'routers/ \(\K[0-9]+' AGENTS.md)
          if [ "$actual_routers" != "$expected_routers" ]; then
            echo "❌ Routers: AGENTS.md says $expected_routers, actual $actual_routers"
            errors=$((errors+1))
          else
            echo "✅ Routers: $actual_routers"
          fi
          # Repository
          actual_repos=$(ls virtual_team/repository/*.py | grep -v __init__ | wc -l)
          expected_repos=$(grep -oP 'repository/ \(\K[0-9]+' AGENTS.md)
          if [ "$actual_repos" != "$expected_repos" ]; then
            echo "❌ Repository: AGENTS.md says $expected_repos, actual $actual_repos"
            errors=$((errors+1))
          else
            echo "✅ Repository: $actual_repos"
          fi
          # Workstation modules
          actual_modules=$(ls -d frontend/src/components/agentstudio/workstation/*/ 2>/dev/null | grep -v '/shared/' | wc -l)
          claude_modules=$(grep -oP '工作台 \K[0-9]+' CLAUDE.md)
          if [ "$actual_modules" != "$claude_modules" ]; then
            echo "❌ Workstation: CLAUDE.md says $claude_modules, actual $actual_modules"
            errors=$((errors+1))
          else
            echo "✅ Workstation modules: $actual_modules"
          fi
          if [ $errors -gt 0 ]; then
            echo "❌ $errors doc inconsistency(s) found — update AGENTS.md / CLAUDE.md"
            exit 1
          fi
          echo "✅ All docs consistent with codebase"

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

