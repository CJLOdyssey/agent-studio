name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=critical
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-test.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt -r requirements-test.txt
      - run: ruff check virtual_team/
      - run: mypy virtual_team/ --strict
      - run: pip-audit --strict --progress-spinner=off -r requirements.txt -r requirements-test.txt 2>&1 || echo "⚠️ pip-audit found vulnerabilities (non-blocking)"
      - run: bandit -c pyproject.toml -r virtual_team/ -ll 2>&1 || echo "⚠️ bandit warnings (non-blocking)"
      - run: PYTHONPATH=. python3 -m pytest virtual_team/ -v --tb=short --ignore=virtual_team/tests/test_e2e_full_flow.py --ignore=virtual_team/tests/test_agent_crud.py --ignore=virtual_team/tests/test_mcp_crud.py --ignore=virtual_team/tests/test_prompt_crud.py --ignore=virtual_team/tests/test_skill_crud.py --ignore=virtual_team/tests/test_team_crud.py --ignore=virtual_team/tests/test_tool_crud.py --ignore=virtual_team/tests/test_full_e2e.py --ignore=virtual_team/tests/test_session_run.py --ignore=virtual_team/tests/test_routers_health.py --ignore=virtual_team/tests/test_auth_api.py --ignore=virtual_team/tests/repository/test_agents.py --ignore=virtual_team/tests/repository/test_teams.py --ignore=virtual_team/tests/repository/test_prompts.py --ignore=virtual_team/tests/repository/test_tools_mcps_skills.py --cov=virtual_team --cov-report=term --cov-fail-under=25

  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: virtual_team
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt -r requirements-test.txt
      - name: Preflight check
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team PYTHONPATH=. python3 scripts/preflight.py
      - name: Migration test
        run: |
          PYTHONPATH=. DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team alembic upgrade head
          PYTHONPATH=. DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team alembic downgrade -1
          PYTHONPATH=. DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team alembic upgrade head
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret nohup python3 -m uvicorn virtual_team.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          sleep 3
          # Wait for backend to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:8080/api/models > /dev/null 2>&1 && break
            sleep 2
          done
      - run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret python3 -m pytest virtual_team/tests/test_e2e_full_flow.py -v --tb=short
      - name: Dump backend log
        if: always()
        run: cat /tmp/backend.log || true

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - name: Run module consistency check
        run: node scripts/check-docs.js
      - name: Verify .env.example + AGENTS.md/CLAUDE.md counts
        run: python3 scripts/check-ci-docs.py

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check bundle size
        run: |
          total=$(du -sb dist/ | cut -f1)
          max=$((10 * 1024 * 1024))  # 10 MB limit
          echo "Bundle size: $(numfmt --to=iec $total)"
          if [ "$total" -gt "$max" ]; then
            echo "❌ Bundle size exceeds 10 MB"
            exit 1
          fi
          echo "✅ Bundle size OK"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

