name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint

  frontend-test:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm test

  frontend-build:
    name: "Frontend: Build & Bundle"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - name: Check bundle size
        run: |
          total=$(du -sb dist/ | cut -f1)
          max=$((10 * 1024 * 1024))
          echo "Bundle size: $(numfmt --to=iec $total)"
          if [ "$total" -gt "$max" ]; then
            echo "❌ Bundle size exceeds 10 MB"
            exit 1
          fi
          echo "✅ Bundle size OK"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Backend Lint & Security ──────────────────────────────────────────────
  backend-lint:
    name: "Backend: Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: ruff check backend/
      - run: mypy backend/ --strict --no-error-summary

  backend-security:
    name: "Backend: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip-audit --strict --progress-spinner=off -r requirements-lock.txt
      - run: bandit -c pyproject.toml -r backend/ -ll

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: "Backend: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run unit tests
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -x -q --tb=short \
            --ignore=tests/e2e/ \
            --ignore=tests/repository/ \
            --ignore=tests/routers/auth/test_auth_api.py \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=45 \
            -n auto \
            || PYTHONPATH=. python3 -m pytest tests/ \
            -x -q --tb=short \
            --ignore=tests/e2e/ \
            --ignore=tests/repository/ \
            --ignore=tests/routers/auth/test_auth_api.py \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=45

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: "Integration (${{ matrix.auth_mode }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Preflight check
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/backend PYTHONPATH=. python3 scripts/preflight.py
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run E2E tests
        run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret python3 -m pytest tests/e2e/test_e2e_full_flow.py -v --tb=short
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── Docs & Config ────────────────────────────────────────────────────────
  docs-check:
    name: "Docs & Config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: node scripts/check-docs.js
      - run: python3 scripts/check-ci-docs.py

  # ── Final Gate ────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI Passed"
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - backend-lint
      - backend-security
      - backend-test
      - integration
      - docs-check
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-test.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-build.result }}" != "success" ]] ||
             [[ "${{ needs.backend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.backend-test.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
