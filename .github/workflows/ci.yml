name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Enterprise: explicit permissions (least-privilege principle).
# For same-repo PRs, GITHUB_TOKEN can write PR comments.
# For fork PRs, GitHub denies write permissions — this is by design,
# not a bug. The comment steps have continue-on-error to handle that.
permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend: Lint & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run typecheck
      - run: npm run lint

  frontend-test:
    name: "Frontend: Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run test:coverage

  frontend-build:
    name: "Frontend: Build & Bundle"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - name: Check bundle size
        run: |
          total=$(du -sb dist/ | cut -f1)
          max=$((10 * 1024 * 1024))
          echo "Bundle size: $(numfmt --to=iec $total)"
          if [ "$total" -gt "$max" ]; then
            echo "❌ Bundle size exceeds 10 MB"
            exit 1
          fi
          echo "✅ Bundle size OK"
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Secrets Scan ─────────────────────────────────────────────────────────
  secrets-scan:
    name: "Security: Secrets Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Container Scan ──────────────────────────────────────────────────────
  container-scan:
    name: "Security: Container Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Scan docker/Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: docker/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Scan frontend/Dockerfile
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: frontend/Dockerfile
          severity: CRITICAL,HIGH
          exit-code: 0

  # ── Backend Lint & Security ──────────────────────────────────────────────
  backend-lint:
    name: "Backend: Lint & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: ruff check backend/
      - run: mypy backend/ --strict --no-error-summary

  backend-security:
    name: "Backend: Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip-audit --strict --progress-spinner=off -r requirements-lock.txt
      - run: bandit -c pyproject.toml -r backend/ -ll

  # ── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: "Backend: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run unit tests
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -q --tb=short \
            --ignore=tests/e2e/ \
            -m 'not integration' \
            --ignore=tests/broker/ \
            --ignore=tests/test_requirement_markers.py \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=89 \
            --reruns 2 \
            --reruns-delay 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Diff Coverage (Change Coverage) ──────────────────────────────────────
  diff-coverage:
    name: "Backend: Diff Coverage"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff comparison
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: Run diff-cover
        run: |
          echo "📊 Checking diff coverage against ${{ github.base_ref }}..."
          git diff origin/${{ github.base_ref }}...HEAD -- backend/ ':!backend/system_team' > /tmp/filtered.diff
          diff-cover coverage.xml \
            --diff-file /tmp/filtered.diff \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=70 \
            --diff-range-notation '..'
      - name: Comment on PR
        if: failure()
        continue-on-error: true  # GitHub denies write to fork PRs — by design, not a bug
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Get diff-cover output
            let diffCoverOutput = '';
            try {
              diffCoverOutput = execSync(
                'diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=70 --show-uncovered',
                { encoding: 'utf-8' }
              );
            } catch (error) {
              diffCoverOutput = error.stdout || error.stderr || 'Error running diff-cover';
            }

            const body = `## ⚠️ Diff Coverage Check Failed

            Your changes have **insufficient test coverage**.

            \`\`\`
            ${diffCoverOutput}
            \`\`\`

            **Requirements:**
            - New/modified code must have at least **70%** test coverage
            - Add tests for uncovered lines before merging

            *This check ensures code quality and prevents untested changes from being merged.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── OpenAPI Diff ──────────────────────────────────────────────────────────
  openapi-diff:
    name: "OpenAPI: Breaking Changes"
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Generate OpenAPI spec (PR)
        run: |
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend-pr.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready (PR)"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:8080/openapi.json | python3 -m json.tool > /tmp/openapi-pr.json
          kill $BACKEND_PID 2>/dev/null || true
      - name: Generate OpenAPI spec (baseline)
        run: |
          git checkout "origin/${{ github.base_ref }}"
          pip install -r requirements-lock.txt --quiet
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8081 > /tmp/backend-base.log 2>&1 &
          BACKEND_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8081/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready (baseline)"
              break
            fi
            sleep 1
          done
          curl -s http://localhost:8081/openapi.json | python3 -m json.tool > /tmp/openapi-base.json
          kill $BACKEND_PID 2>/dev/null || true
      - name: Install oasdiff
        run: |
          curl -sL "https://github.com/Tufin/oasdiff/releases/download/v1.12.5/oasdiff_linux_amd64" -o /usr/local/bin/oasdiff
          chmod +x /usr/local/bin/oasdiff
      - name: Check for breaking changes
        run: |
          oasdiff breaking /tmp/openapi-base.json /tmp/openapi-pr.json

  # ── Integration Tests ────────────────────────────────────────────────────
  integration:
    name: "Integration (${{ matrix.auth_mode }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        auth_mode: [legacy, rbac]
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Preflight check
        run: DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/backend PYTHONPATH=. python3 scripts/preflight.py
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run E2E tests
        run: PYTHONPATH=. AUTH_MODE=${{ matrix.auth_mode }} CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret python3 -m pytest tests/e2e/test_e2e_full_flow.py -v --tb=short --reruns 2 --reruns-delay 5
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── Docs & Config ────────────────────────────────────────────────────────
  docs-check:
    name: "Docs & Config"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VERSION }}"
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
      - run: node scripts/check-docs.js
      - run: python3 scripts/check-ci-docs.py

  # ── Requirement Coverage ─────────────────────────────────────────────────
  requirement-coverage:
    name: "Backend: Requirement Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Run tests with requirement markers
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            --ignore=tests/test_requirement_markers.py \
            --ignore=tests/broker/ \
            --requirement-coverage \
            -m "not integration" \
            --ignore=tests/e2e/ \
            --ignore=tests/repository/ \
            --ignore=tests/routers/auth/test_auth_api.py \
            -q --tb=short

  # ── Flaky Tests ──────────────────────────────────────────────────────────
  flaky-check:
    name: "Backend: Flaky Tests"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - name: Collect flaky tests
        id: collect
        run: |
          COUNT=$(PYTHONPATH=. python3 -m pytest tests/ --collect-only -m flaky -q 2>/dev/null | tail -1 | grep -oP '^\d+' || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Collected $COUNT flaky test(s)"
      - name: Run flaky tests
        if: steps.collect.outputs.count != '0'
        run: |
          PYTHONPATH=. python3 -m pytest tests/ \
            -m flaky \
            -q --tb=short \
            --reruns 3 \
            --reruns-delay 5 \
            --ignore=tests/e2e/ \
            --ignore=tests/broker/ \
            --ignore=tests/test_requirement_markers.py
      - name: Report flaky count
        if: always()
        run: |
          echo "Flaky tests collected: ${{ steps.collect.outputs.count }}"
          echo "Note: flaky-check is advisory (continue-on-error)"

  # ── Mutation Tests ─────────────────────────────────────────────────────────
  mutation-test:
    name: "Backend: Mutation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff-based file selection
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install "mutmut==2.5.1" --quiet
      - name: Select changed files for mutation
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'backend/**/*.py' ':!backend/system_team/*' ':!backend/thinking_tree/*' ':!backend/graph/*' ':!backend/checkpoint/*' | paste -sd,)
          else
            FILES=$(git diff --name-only HEAD~1...HEAD -- 'backend/**/*.py' ':!backend/system_team/*' ':!backend/thinking_tree/*' ':!backend/graph/*' ':!backend/checkpoint/*' | paste -sd,)
          fi
          if [ -z "$FILES" ]; then
            echo "No changed backend files to mutate, using fallback"
            FILES="backend/core/infra/database.py"
          fi
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Mutating: $FILES"
      - name: Run mutation tests
        timeout-minutes: 5
        run: |
          # Build test runner args: map source paths to their test files
          IFS=',' read -ra FILES <<< "${{ steps.diff.outputs.files }}"
          TEST_ARGS=""
          for f in "${FILES[@]}"; do
            case "$f" in
              backend/core/infra/database.py) TEST_ARGS+=" tests/core/infra/test_database.py" ;;
              backend/routers/skills.py)      TEST_ARGS+=" tests/routers/test_routers_skills.py" ;;
              backend/routers/mcps.py)        TEST_ARGS+=" tests/routers/test_routers_mcps.py" ;;
              backend/routers/tools.py)       TEST_ARGS+=" tests/routers/test_routers_tools.py" ;;
              backend/routers/teams.py)       TEST_ARGS+=" tests/routers/test_routers_teams.py" ;;
              backend/routers/versions.py)    TEST_ARGS+=" tests/routers/test_routers_versions.py" ;;
              backend/routers/prompts.py)     TEST_ARGS+=" tests/routers/test_routers_prompts.py" ;;
              backend/routers/sessions.py)    TEST_ARGS+=" tests/routers/test_routers_sessions.py" ;;
              backend/routers/runs.py)        TEST_ARGS+=" tests/routers/test_routers_runs.py" ;;
              backend/routers/agents.py)      TEST_ARGS+=" tests/routers/test_routers_agents.py" ;;
              backend/routers/providers.py)   TEST_ARGS+=" tests/routers/test_provider_routes.py" ;;
              backend/repository/teams.py)    TEST_ARGS+=" tests/routers/test_routers_teams.py" ;;
              backend/repository/versions.py) TEST_ARGS+=" tests/routers/test_routers_versions.py" ;;
              backend/repository/tools.py)    TEST_ARGS+=" tests/routers/test_routers_tools.py" ;;
              backend/repository/skills.py)   TEST_ARGS+=" tests/routers/test_routers_skills.py" ;;
            esac
          done
          if [ -z "$TEST_ARGS" ]; then
            echo "No test mapping for changed files, using full suite"
            TEST_ARGS="tests/ -m 'not integration' --ignore=tests/e2e/ --ignore=tests/broker/ --ignore=tests/test_requirement_markers.py"
          fi
          echo "Test args: $TEST_ARGS"
          PYTHONPATH=. mutmut run \
            --paths-to-mutate "${{ steps.diff.outputs.files }}" \
            --tests-dir tests/ \
            --CI \
            --simple-output \
            --runner "python3 -m pytest $TEST_ARGS -q --tb=short -x" 2>&1 | tee /tmp/mutmut.log
          # mutmut uses \r to overwrite progress lines; split them first
          tr '\r' '\n' < /tmp/mutmut.log | grep -E '^[[:space:]]*[0-9]+/[0-9]+' | tail -1 > /tmp/mutmut_score.txt
      - name: Show mutation score
        if: always()
        run: mutmut results
      - name: Check mutation score threshold
        if: always()
        run: |
          SCORE_LINE=$(cat /tmp/mutmut_score.txt 2>/dev/null || echo "")
          if [ -z "$SCORE_LINE" ]; then
            echo "⚠️  No score line found — cannot determine mutation score"
            exit 0
          fi
          # Parse killed / total from mutmut progress line (format: "K/T  killed/total")
          KILLED=$(echo "$SCORE_LINE" | grep -oP '\d+(?=/)' | head -1 || echo "0")
          TOTAL=$(echo "$SCORE_LINE" | grep -oP '(?<=/)\d+' | head -1 || echo "1")
          if [ "$TOTAL" -eq 0 ]; then TOTAL=1; fi
          SCORE=$(python3 -c "print(int($KILLED / $TOTAL * 100))")
          echo "Mutation score: ${SCORE}% (${KILLED}/${TOTAL})"
          if [ "$SCORE" -lt 60 ]; then
            echo "❌ Mutation score ${SCORE}% is below 60% threshold"
            exit 1
          fi
          echo "✅ Mutation score ${SCORE}% meets 60% threshold"
      - name: Comment mutation score on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true  # GitHub denies write to fork PRs — by design, not a bug
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let scoreLine = 'N/A';
            try {
              scoreLine = fs.readFileSync('/tmp/mutmut_score.txt', 'utf-8').trim();
            } catch (e) {}

            const files = '${{ steps.diff.outputs.files }}';
            const body = `## 变异测试结果

            **变更文件**: \`${files}\`
            **结果**: \`${scoreLine}\`

            | 状态 | 含义 |
            |------|------|
            | killed | 变异被测试消灭 |
            | survived | 变异存活（测试未覆盖） |
            | suspicious | 测试耗时异常 |
            | timeout | 测试套件超时 |
            | skipped | 已跳过 |`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── Load Tests ─────────────────────────────────────────────────────────────
  load-test:
    name: "Backend: Load Test"
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --name virtual-team-redis
        ports:
          - 6379:6379
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: backend
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ env.PYTHON_VERSION }}"
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: pip install -r requirements-lock.txt --quiet
      - run: pip install locust --quiet
      - name: Start backend
        run: |
          PYTHONPATH=. AUTH_MODE=legacy CHECKPOINTER_BACKEND=memory RATE_LIMIT=9999 REDIS_URL=redis://localhost:6379/1 AUTH_SECRET=ci-test-secret \
            python3 -m uvicorn backend.core.app:app --host 0.0.0.0 --port 8080 > /tmp/backend.log 2>&1 &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/models > /dev/null 2>&1; then
              echo "✅ Backend ready"
              break
            fi
            sleep 1
          done
      - name: Run load test
        run: |
          locust --headless \
            --users 20 \
            --spawn-rate 2 \
            --run-time 30s \
            --host http://localhost:8080 \
            --csv /tmp/locust \
            -f tests/loadtests/locustfile.py 2>&1 | tee /tmp/locust.log
      - name: Assert failure rate < 1%
        run: |
          FAILURES=$(grep -oP '"failures":\s*\K\d+' /tmp/locust_stats.csv | tail -1 || echo "0")
          TOTAL=$(grep -oP '"requestCount":\s*\K\d+' /tmp/locust_stats.csv | tail -1 || echo "1")
          FAILURE_RATE=$(python3 -c "print(f'{$FAILURES / max($TOTAL, 1) * 100:.2f}%')")
          echo "Requests: $TOTAL, Failures: $FAILURES, Failure rate: $FAILURE_RATE"
          python3 -c "
          failures = $FAILURES
          total = max($TOTAL, 1)
          rate = failures / total * 100
          if rate >= 1:
              raise SystemExit(f'FAILURE_RATE={rate:.2f}% exceeds 1% threshold')
          print(f'PASS: failure rate {rate:.2f}% < 1%')
          "
      - name: Stop backend
        if: always()
        run: kill $BACKEND_PID 2>/dev/null || true
      - name: Dump backend log
        if: failure()
        run: cat /tmp/backend.log || true

  # ── Final Gate ────────────────────────────────────────────────────────────
  ci-passed:
    name: "CI Passed"
    if: always()
    needs:
      - frontend-lint
      - frontend-test
      - frontend-build
      - secrets-scan
      - container-scan
      - backend-lint
      - backend-security
      - backend-test
      - diff-coverage
      - openapi-diff
      - integration
      - docs-check
      - requirement-coverage
      - flaky-check
      - mutation-test
      - load-test
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.frontend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-test.result }}" != "success" ]] ||
             [[ "${{ needs.frontend-build.result }}" != "success" ]] ||
             [[ "${{ needs.secrets-scan.result }}" != "success" ]] ||
             [[ "${{ needs.backend-lint.result }}" != "success" ]] ||
             [[ "${{ needs.backend-security.result }}" != "success" ]] ||
             [[ "${{ needs.backend-test.result }}" != "success" ]] ||
             [[ "${{ needs.integration.result }}" != "success" ]] ||
             [[ "${{ needs.docs-check.result }}" != "success" ]]; then
            echo "❌ One or more required jobs failed"
            exit 1
          fi
          # diff-coverage only runs on PRs, skip if skipped
          if [[ "${{ needs.diff-coverage.result }}" == "failure" ]]; then
            echo "❌ Diff coverage check failed"
            exit 1
          fi
          # openapi-diff is advisory (continue-on-error, baseline not yet established)
          if [[ "${{ needs.openapi-diff.result }}" == "failure" ]]; then
            echo "⚠️  OpenAPI diff found issues (advisory only)"
          fi
          # container-scan is advisory (continue-on-error)
          if [[ "${{ needs.container-scan.result }}" == "failure" ]]; then
            echo "⚠️  Container scan found issues (advisory only)"
          fi
          # requirement-coverage is advisory (pre-existing test failures tracked separately)
          if [[ "${{ needs.requirement-coverage.result }}" == "failure" ]]; then
            echo "⚠️  Requirement coverage below threshold (advisory only)"
          fi
          # flaky-check is advisory (continue-on-error)
          if [[ "${{ needs.flaky-check.result }}" == "failure" ]]; then
            echo "⚠️  Flaky test check found issues (advisory only)"
          fi
          # load-test is advisory (CI runner performance varies)
          if [[ "${{ needs.load-test.result }}" == "failure" ]]; then
            echo "⚠️  Load test failed (advisory only)"
          fi
          echo "✅ All CI checks passed"
