# ── CI: Quality gate pipeline ──────────────────────────────────────────────
# Backend:  lint → typecheck → security → test (same runner, shared install)
# Frontend: format → lint → typecheck → audit → test → build
# Integration: services containers for PostgreSQL + Redis
# ──────────────────────────────────────────────────────────────────────────────

name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ═══ Backend: ruff → mypy → bandit → pytest (same runner) ═══════════════
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt -r requirements-dev.txt mypy bandit diff-cover
      - name: Lint (ruff)
        uses: astral-sh/ruff-action@v1
        with:
          args: check virtual_team/ tests/ alembic/
      - name: Type check (mypy)
        run: mypy virtual_team/ --ignore-missing-imports
      - name: Security (bandit)
        run: bandit -r virtual_team/ -ll -s B104,B310,B608
      - name: Tests + coverage
        run: python -m pytest tests/ -v --tb=short --cov-report=xml
      - name: Diff coverage check
        run: |
          git fetch origin main --depth=100
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=80
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml

  # ═══ Frontend: format → lint → typecheck → audit → test → build ═════════
  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'frontend/') }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Security audit
        run: npm audit --audit-level=high --production || echo "Security warnings (non-blocking)"
      - name: Tests
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage/
      - name: Upload dist
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/

  # ═══ Integration: services containers (PostgreSQL + Redis) ══════════════
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || contains(github.event.pull_request.changed_files, 'virtual_team/') || contains(github.event.pull_request.changed_files, 'requirements') || contains(github.event.pull_request.changed_files, 'tests/') || contains(github.event.pull_request.changed_files, 'alembic/') }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: virtual_team
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt -r requirements-dev.txt
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/virtual_team
          REDIS_URL: redis://localhost:6379/0
        run: python -m pytest tests/integration/test_integration.py tests/functional/test_user_flow.py -v --tb=short

  # ═══ E2E (placeholder) ══════════════════════════════════════════════════
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "E2E placeholder — Playwright to be added"
